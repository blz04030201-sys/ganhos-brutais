<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#050510"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>

  <!-- Barbell horizontal bar -->
  <rect x="112" y="242" width="288" height="28" rx="14" fill="url(#bar)" opacity="0.9"/>

  <!-- Left weight stack -->
  <rect x="96" y="198" width="52" height="116" rx="10" fill="url(#accent)"/>
  <rect x="64" y="214" width="40" height="84" rx="8" fill="url(#accent)" opacity="0.8"/>

  <!-- Right weight stack -->
  <rect x="364" y="198" width="52" height="116" rx="10" fill="url(#accent)"/>
  <rect x="408" y="214" width="40" height="84" rx="8" fill="url(--accent)" opacity="0.8"/>
  <rect x="408" y="214" width="40" height="84" rx="8" fill="#3B82F6" opacity="0.8"/>

  <!-- Arrow / chevron up - growth indicator -->
  <path d="M230 310 L256 260 L282 310" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Subtle inner glow dots -->
  <circle cx="256" cy="256" r="3" fill="white" opacity="0.6"/>
</svg>
